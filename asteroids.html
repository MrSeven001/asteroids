<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      color: lime;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    #mensaje {
      position: fixed;
      top: 50%;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="info">Esperando giroscopio...</div>
  <div id="mensaje">Toca la pantalla para activar</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angulo: 0,
      velocidadX: 0,
      velocidadY: 0,
      tamano: 20
    };

    let inclinacionX = 0;
    let inclinacionY = 0;
    let giroscopioActivo = false;

    document.addEventListener('click', () => {
      mensaje.style.display = 'none';
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(respuesta => {
          if (respuesta === 'granted') {
            activarGiroscopio();
          } else {
            info.textContent = 'Permiso denegado';
          }
        });
      } else {
        activarGiroscopio();
      }
    });

    function activarGiroscopio() {
      window.addEventListener('deviceorientation', (evento) => {
        giroscopioActivo = true;
        inclinacionX = evento.gamma / 90;
        inclinacionY = evento.beta  / 90;

        // Mostramos los valores en pantalla para diagnosticar
        info.textContent =
          'gamma: ' + (evento.gamma ? evento.gamma.toFixed(1) : 'null') +
          ' | beta: ' + (evento.beta ? evento.beta.toFixed(1) : 'null');
      });

      // Si después de 3 segundos no llegó nada, avisamos
      setTimeout(() => {
        if (!giroscopioActivo) {
          info.textContent = 'Giroscopio no detectado en este dispositivo';
        }
      }, 3000);
    }

    function dibujarNave() {
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.rotate(nave.angulo);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function actualizarNave() {
      nave.angulo += inclinacionX * 0.05;
      const empuje = -inclinacionY * 0.1;
      nave.velocidadX += Math.sin(nave.angulo) * empuje;
      nave.velocidadY -= Math.cos(nave.angulo) * empuje;
      nave.velocidadX *= 0.98;
      nave.velocidadY *= 0.98;
      nave.x += nave.velocidadX;
      nave.y += nave.velocidadY;
      if (nave.x < 0) nave.x = canvas.width;
      if (nave.x > canvas.width)  nave.x = 0;
      if (nave.y < 0) nave.y = canvas.height;
      if (nave.y > canvas.height) nave.y = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      actualizarNave();
      dibujarNave();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
