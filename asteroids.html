<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #mensaje {
      position: fixed;
      top: 50%;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="mensaje">Toca la pantalla para activar</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angulo: 0,
      velocidadX: 0,
      velocidadY: 0,
      tamano: 20
    };

    let inclinacionX = 0;
    let inclinacionY = 0;
    let juegoActivo = false;
    let balas = [];
    let ultimoDisparo = 0;
    let meteoritos = [];
    let puntos = 0;
    let vivo = true;

    // Crea un meteorito en un borde aleatorio de la pantalla
    function crearMeteorito(tamano, x, y) {
      // Si no se dan coordenadas, aparece en un borde aleatorio
      if (x === undefined) {
        const borde = Math.floor(Math.random() * 4);
        if (borde === 0) { x = Math.random() * canvas.width; y = -tamano; }
        else if (borde === 1) { x = Math.random() * canvas.width; y = canvas.height + tamano; }
        else if (borde === 2) { x = -tamano; y = Math.random() * canvas.height; }
        else { x = canvas.width + tamano; y = Math.random() * canvas.height; }
      }

      // Apunta hacia el centro aproximadamente con algo de variación
      const anguloAlCentro = Math.atan2(
        canvas.height / 2 - y,
        canvas.width  / 2 - x
      ) + (Math.random() - 0.5) * 1.5;

      const velocidad = tamano > 30 ? 0.8 : tamano > 15 ? 1.3 : 2.0;

      return {
        x, y,
        tamano,
        velocidadX: Math.cos(anguloAlCentro) * velocidad,
        velocidadY: Math.sin(anguloAlCentro) * velocidad,
        // Forma irregular: puntos del borde con variaciones
        forma: Array.from({ length: 10 }, (_, i) => {
          const angulo = (i / 10) * Math.PI * 2;
          const radio = tamano * (0.7 + Math.random() * 0.5);
          return { x: Math.cos(angulo) * radio, y: Math.sin(angulo) * radio };
        })
      };
    }

    // Empieza con 4 meteoritos grandes
    let ronda = 1;

    function iniciarMetoritos() {
      for (let i = 0; i < ronda + 1; i++) {
        meteoritos.push(crearMeteorito(45));
      }
    }

    function actualizarMetoritos() {
      meteoritos.forEach(m => {
        m.x += m.velocidadX;
        m.y += m.velocidadY;

        // Rebota por los bordes
        if (m.x < -m.tamano) m.x = canvas.width + m.tamano;
        if (m.x > canvas.width + m.tamano) m.x = -m.tamano;
        if (m.y < -m.tamano) m.y = canvas.height + m.tamano;
        if (m.y > canvas.height + m.tamano) m.y = -m.tamano;
      });
    }

    function dibujarMetoritos() {
      ctx.strokeStyle = 'gray';
      ctx.lineWidth = 2;
      meteoritos.forEach(m => {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.beginPath();
        ctx.moveTo(m.forma[0].x, m.forma[0].y);
        m.forma.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      });
    }

    // Detecta si un punto está dentro de un círculo
    function distancia(ax, ay, bx, by) {
      return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    }

    function chequearColisiones() {
      let meteoritosNuevos = [];

      meteoritos = meteoritos.filter(m => {
        // Bala vs meteorito
        let golpeado = false;
        balas = balas.filter(bala => {
          if (distancia(bala.x, bala.y, m.x, m.y) < m.tamano) {
            golpeado = true;
            return false; // elimina la bala
          }
          return true;
        });

        if (golpeado) {
          // Se rompe en dos pedazos más pequeños
          if (m.tamano > 15) {
            meteoritosNuevos.push(crearMeteorito(m.tamano / 2, m.x, m.y));
            meteoritosNuevos.push(crearMeteorito(m.tamano / 2, m.x, m.y));
          }
          puntos += m.tamano > 30 ? 10 : m.tamano > 15 ? 20 : 40;
          return false; // elimina el meteorito
        }

        // Nave vs meteorito
        if (vivo && distancia(nave.x, nave.y, m.x, m.y) < m.tamano + nave.tamano * 0.6) {
          vivo = false;
        }

        return true;
      });

      meteoritos = meteoritos.concat(meteoritosNuevos);

      // Si no quedan meteoritos, spawneamos más
      if (meteoritos.length === 0) {
        ronda++;
        iniciarMetoritos();
      }
    }

    function dibujarPuntos() {
      ctx.fillStyle = 'white';
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, 15, 30);
      ctx.fillText('Ronda: ' + ronda, 15, 55);
    }

    function dibujarGameOver() {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, canvas.width / 2, canvas.height / 2 + 40);
      ctx.fillText('Toca para reiniciar', canvas.width / 2, canvas.height / 2 + 80);
      ctx.textAlign = 'left';
    }

    function reiniciar() {
      nave.x = canvas.width / 2;
      nave.y = canvas.height / 2;
      nave.angulo = 0;
      nave.velocidadX = 0;
      nave.velocidadY = 0;
      balas = [];
      meteoritos = [];
      puntos = 0;
      vivo = true;
      ronda = 1;
      iniciarMetoritos();
    }

    document.addEventListener('click', () => {
      if (!juegoActivo) {
        mensaje.style.display = 'none';
        juegoActivo = true;
        iniciarMetoritos();
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission().then(r => {
            if (r === 'granted') activarGiroscopio();
          });
        } else {
          activarGiroscopio();
        }
      } else if (!vivo) {
        reiniciar();
      } else {
        disparar();
      }
    });

    function activarGiroscopio() {
      window.addEventListener('deviceorientation', (e) => {
        inclinacionX = e.gamma / 45;
        inclinacionY = e.beta  / 25;
      });
    }

    function disparar() {
      const ahora = Date.now();
      if (ahora - ultimoDisparo < 300) return;
      ultimoDisparo = ahora;
      balas.push({
        x: nave.x,
        y: nave.y,
        velocidadX: Math.sin(nave.angulo) * 8,
        velocidadY: -Math.cos(nave.angulo) * 8
      });
    }

    function actualizarBalas() {
      balas = balas.filter(bala => {
        bala.x += bala.velocidadX;
        bala.y += bala.velocidadY;
        return bala.x > 0 && bala.x < canvas.width &&
               bala.y > 0 && bala.y < canvas.height;
      });
    }

    function dibujarBalas() {
      ctx.fillStyle = 'yellow';
      balas.forEach(bala => {
        ctx.beginPath();
        ctx.arc(bala.x, bala.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function dibujarNave() {
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.rotate(nave.angulo);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function actualizarNave() {
      const fuerza = Math.sqrt(inclinacionX * inclinacionX + inclinacionY * inclinacionY);
      if (fuerza > 0.15) {
        const anguloObjetivo = Math.atan2(inclinacionX, -inclinacionY);
        let diff = anguloObjetivo - nave.angulo;
        if (diff > Math.PI)  diff -= Math.PI * 2;
        if (diff < -Math.PI) diff += Math.PI * 2;
        nave.angulo += diff * 0.12;
        const velocidadBase = Math.min(fuerza, 1) * 1.8;
        const velocidad = inclinacionY < -0.15 ? velocidadBase * 1.5 : velocidadBase;
        nave.velocidadX += (Math.sin(nave.angulo) * velocidad - nave.velocidadX) * 0.15;
        nave.velocidadY += (-Math.cos(nave.angulo) * velocidad - nave.velocidadY) * 0.15;
      } else {
        nave.velocidadX *= 0.88;
        nave.velocidadY *= 0.88;
      }
      nave.x += nave.velocidadX;
      nave.y += nave.velocidadY;
      if (nave.x < 0) nave.x = canvas.width;
      if (nave.x > canvas.width)  nave.x = 0;
      if (nave.y < 0) nave.y = canvas.height;
      if (nave.y > canvas.height) nave.y = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (vivo) {
        actualizarNave();
        actualizarBalas();
        actualizarMetoritos();
        chequearColisiones();
        dibujarNave();
        dibujarBalas();
        dibujarMetoritos();
        dibujarPuntos();
      } else {
        dibujarGameOver();
      }

      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
