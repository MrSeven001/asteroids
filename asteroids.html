<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #mensaje {
      position: fixed;
      top: 20px;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="mensaje">Toca la pantalla para activar el giroscopio</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angulo: 0,
      velocidadX: 0,
      velocidadY: 0,
      tamano: 20
    };

    // Datos del giroscopio
    let inclinacionX = 0; // izquierda/derecha
    let inclinacionY = 0; // adelante/atrás

    // El giroscopio necesita permiso en iOS, en Android funciona solo
    document.addEventListener('click', () => {
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        // iPhone necesita pedir permiso
        DeviceMotionEvent.requestPermission().then(respuesta => {
          if (respuesta === 'granted') {
            activarGiroscopio();
            mensaje.style.display = 'none';
          }
        });
      } else {
        // Android no necesita permiso
        activarGiroscopio();
        mensaje.style.display = 'none';
      }
    });

    function activarGiroscopio() {
      window.addEventListener('deviceorientation', (evento) => {
        // gamma = inclinación izquierda/derecha (-90 a 90)
        // beta  = inclinación adelante/atrás (-180 a 180)
        inclinacionX = evento.gamma / 90;  // lo normalizamos entre -1 y 1
        inclinacionY = evento.beta  / 90;
      });
    }

    function dibujarNave() {
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.rotate(nave.angulo);

      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }

    function actualizarNave() {
      // Inclinar izquierda/derecha gira la nave
      nave.angulo += inclinacionX * 0.05;

      // Inclinar hacia adelante acelera la nave
      const empuje = -inclinacionY * 0.1;
      nave.velocidadX += Math.sin(nave.angulo) * empuje;
      nave.velocidadY -= Math.cos(nave.angulo) * empuje;

      // Fricción para que no acelere infinito
      nave.velocidadX *= 0.98;
      nave.velocidadY *= 0.98;

      // Mover la nave
      nave.x += nave.velocidadX;
      nave.y += nave.velocidadY;

      // Si sale por un lado, aparece por el otro
      if (nave.x < 0) nave.x = canvas.width;
      if (nave.x > canvas.width)  nave.x = 0;
      if (nave.y < 0) nave.y = canvas.height;
      if (nave.y > canvas.height) nave.y = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      actualizarNave();
      dibujarNave();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
