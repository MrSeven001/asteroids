<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #mensaje {
      position: fixed;
      top: 50%;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="mensaje">Toca la pantalla para activar</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angulo: 0,
      velocidadX: 0,
      velocidadY: 0,
      tamano: 20
    };

    let inclinacionX = 0; // izquierda/derecha
    let inclinacionY = 0; // arriba/abajo

    document.addEventListener('click', () => {
      mensaje.style.display = 'none';
      if (typeof DeviceMotionEvent !== 'undefined' &&
          typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission().then(r => {
          if (r === 'granted') activarGiroscopio();
        });
      } else {
        activarGiroscopio();
      }
    });

    function activarGiroscopio() {
      window.addEventListener('deviceorientation', (e) => {
        // gamma = inclinación izquierda/derecha
        // beta  = inclinación adelante/atrás
        inclinacionX = e.gamma / 45; // normalizado: -1 a 1 con 45 grados
        inclinacionY = e.beta  / 45;
      });
    }

    function dibujarNave() {
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.rotate(nave.angulo);

      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();

      ctx.restore();
    }

    function actualizarNave() {
      // Calculamos la fuerza total de inclinación
      const fuerza = Math.sqrt(inclinacionX * inclinacionX + inclinacionY * inclinacionY);

      if (fuerza > 0.1) { // zona muerta para evitar temblor
        // El ángulo apunta hacia donde inclinas
        nave.angulo = Math.atan2(inclinacionX, -inclinacionY);

        // La nave se mueve hacia donde apunta
        const velocidad = Math.min(fuerza, 1) * 3;
        nave.velocidadX = Math.sin(nave.angulo) * velocidad;
        nave.velocidadY = -Math.cos(nave.angulo) * velocidad;
      } else {
        // Si está casi plano, frena suavemente
        nave.velocidadX *= 0.9;
        nave.velocidadY *= 0.9;
      }

      nave.x += nave.velocidadX;
      nave.y += nave.velocidadY;

      // Si sale por un lado aparece por el otro
      if (nave.x < 0) nave.x = canvas.width;
      if (nave.x > canvas.width)  nave.x = 0;
      if (nave.y < 0) nave.y = canvas.height;
      if (nave.y > canvas.height) nave.y = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      actualizarNave();
      dibujarNave();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
