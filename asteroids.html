<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #mensaje {
      position: fixed;
      top: 50%;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="mensaje">Toca la pantalla para activar</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height - 60,
      angulo: 0,
      velocidadX: 0,
      tamano: 20
    };

    let inclinacionX = 0;
    let juegoActivo = false;
    let balas = [];
    let balasEnemigas = [];
    let ultimoDisparo = 0;
    let meteoritos = [];
    let puntos = 0;
    let vidas = 2;
    let vivo = true;
    let ronda = 0;
    let naveEnemiga = null;
    let puntosUltimaEnemiga = 0;
    let invencible = false;
    let jefe = null;
    let ultimoDisparoJefe = 0;
    let escudo = false;

    function crearMeteorito(tamano, x, y) {
      if (x === undefined) {
        x = Math.random() * canvas.width;
        y = -tamano;
      }

      const velocidad = 1.5 + Math.random() * 1.5;

      return {
        x, y, tamano,
        velocidadX: 0,
        velocidadY: velocidad,
        forma: Array.from({ length: 10 }, (_, i) => {
          const angulo = (i / 10) * Math.PI * 2;
          const radio = tamano * (0.7 + Math.random() * 0.5);
          return { x: Math.cos(angulo) * radio, y: Math.sin(angulo) * radio };
        })
      };
    }

    function crearNaveEnemiga() {
      const x = Math.random() * canvas.width;
      const y = -20;
      return {
        x, y,
        angulo: Math.PI,
        velocidadX: (Math.random() - 0.5) * 1.5,
        velocidadY: 1.2,
        tamano: 15
      };
    }

    // ===== SISTEMA DE JEFES =====
    // Cada jefe es un polígono regular de "lados" lados.
    // Dispara una bala desde cada vértice hacia afuera.
    function crearJefe(lados, velocidadMov, intervaloDisparo) {
      return {
        lados: lados,
        x: canvas.width / 2,
        y: 100,
        tamano: 50,
        vidaMax: 15 + ronda * 3,
        vida: 15 + ronda * 3,
        rotacion: 0,
        velocidadX: velocidadMov,
        intervaloDisparo: intervaloDisparo
      };
    }

    // Devuelve la configuración del jefe según la ronda (10, 20, 30...)
    function obtenerConfigJefe(numeroJefe) {
      // numeroJefe: 1 = ronda 10, 2 = ronda 20, etc.
      switch (numeroJefe) {
        case 1: return { lados: 3, velocidad: 1.5, intervalo: 1500 }; // Triángulo
        default: return { lados: 3, velocidad: 1.5, intervalo: 1500 };
      }
    }

    let metoritosEnCola = 0;
    let tiempoUltimoSpawn = 0;

    function iniciarMetoritos() {
      const numeroRonda = ronda + 1;
      if (numeroRonda % 10 === 0 && !jefe) {
        const numeroJefe = numeroRonda / 10;
        const config = obtenerConfigJefe(numeroJefe);
        jefe = crearJefe(config.lados, config.velocidad, config.intervalo);
        metoritosEnCola = 0;
      } else {
        metoritosEnCola = ronda + 3;
      }
    }

    function actualizarMetoritos() {
      meteoritos.forEach(m => {
        m.x += m.velocidadX;
        m.y += m.velocidadY;

        if (m.y > canvas.height + m.tamano) {
          m.y = -m.tamano;
          m.x = Math.random() * canvas.width;
          m.velocidadY = 1.5 + Math.random() * 1.5;
        }
        if (m.x < -m.tamano) m.x = canvas.width + m.tamano;
        if (m.x > canvas.width + m.tamano) m.x = -m.tamano;
      });
    }

    function actualizarNaveEnemiga() {
      if (!naveEnemiga) return;
      naveEnemiga.x += naveEnemiga.velocidadX;
      naveEnemiga.y += naveEnemiga.velocidadY;
      if (naveEnemiga.y > canvas.height + 30) {
        naveEnemiga = null;
      }
      if (naveEnemiga) {
        if (naveEnemiga.x < -30) naveEnemiga.x = canvas.width + 30;
        if (naveEnemiga.x > canvas.width + 30) naveEnemiga.x = -30;
      }
    }

    // Calcula las posiciones de los vértices de un polígono regular
    function obtenerVertices(jefe) {
      const vertices = [];
      for (let i = 0; i < jefe.lados; i++) {
        // -PI/2 para que siempre haya un vértice apuntando hacia arriba
        const angulo = jefe.rotacion + (i / jefe.lados) * Math.PI * 2 - Math.PI / 2;
        vertices.push({
          x: jefe.x + Math.cos(angulo) * jefe.tamano,
          y: jefe.y + Math.sin(angulo) * jefe.tamano,
          angulo: angulo
        });
      }
      return vertices;
    }

    function actualizarJefe() {
      if (!jefe) return;
      jefe.rotacion += 0.005;

      // Movimiento de lado a lado (rebota en los bordes)
      jefe.x += jefe.velocidadX;
      if (jefe.x < jefe.tamano || jefe.x > canvas.width - jefe.tamano) {
        jefe.velocidadX *= -1;
      }

      // Dispara desde cada vértice
      const ahora = Date.now();
      if (ahora - ultimoDisparoJefe > jefe.intervaloDisparo) {
        ultimoDisparoJefe = ahora;
        const vertices = obtenerVertices(jefe);
        vertices.forEach(v => {
          balasEnemigas.push({
            x: v.x,
            y: v.y,
            velocidadX: Math.cos(v.angulo) * 3,
            velocidadY: Math.sin(v.angulo) * 3
          });
        });
      }
    }

    function actualizarBalasEnemigas() {
      balasEnemigas = balasEnemigas.filter(b => {
        b.x += b.velocidadX;
        b.y += b.velocidadY;
        return b.y < canvas.height + 10 && b.x > -10 && b.x < canvas.width + 10 && b.y > -10;
      });
    }

    function dibujarMetoritos() {
      ctx.strokeStyle = 'gray';
      ctx.lineWidth = 2;
      meteoritos.forEach(m => {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.beginPath();
        ctx.moveTo(m.forma[0].x, m.forma[0].y);
        m.forma.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      });
    }

    function dibujarNaveEnemiga() {
      if (!naveEnemiga) return;
      ctx.save();
      ctx.translate(naveEnemiga.x, naveEnemiga.y);
      ctx.rotate(naveEnemiga.angulo);
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(0, -5, 8, 5, 0, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    function dibujarJefe() {
      if (!jefe) return;

      const vertices = obtenerVertices(jefe);

      ctx.strokeStyle = 'orangered';
      ctx.lineWidth = 3;
      ctx.beginPath();
      vertices.forEach((v, i) => {
        if (i === 0) ctx.moveTo(v.x, v.y);
        else ctx.lineTo(v.x, v.y);
      });
      ctx.closePath();
      ctx.stroke();

      // Barra de vida
      const anchoBarra = 200;
      const x = canvas.width / 2 - anchoBarra / 2;
      const y = 20;
      ctx.strokeStyle = 'white';
      ctx.strokeRect(x, y, anchoBarra, 12);
      ctx.fillStyle = 'orangered';
      ctx.fillRect(x, y, anchoBarra * (jefe.vida / jefe.vidaMax), 12);
    }

    function dibujarBalasEnemigas() {
      ctx.fillStyle = 'orangered';
      balasEnemigas.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function distancia(ax, ay, bx, by) {
      return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    }

    function perderVida() {
      vidas--;
      if (vidas <= 0) {
        vivo = false;
      } else {
        invencible = true;
        nave.x = canvas.width / 2;
        nave.velocidadX = 0;
        setTimeout(() => { invencible = false; }, 2000);
      }
    }

    function chequearColisiones() {
      let meteoritosNuevos = [];

      meteoritos = meteoritos.filter(m => {
        let golpeado = false;
        balas = balas.filter(bala => {
          if (distancia(bala.x, bala.y, m.x, m.y) < m.tamano) {
            golpeado = true;
            return false;
          }
          return true;
        });

        if (golpeado) {
          puntos += 10;
          return false;
        }

        if (!invencible && distancia(nave.x, nave.y, m.x, m.y) < m.tamano + nave.tamano * 0.6) {
          perderVida();
        }

        return true;
      });

      meteoritos = meteoritos.concat(meteoritosNuevos);

      if (naveEnemiga) {
        let naveEnemigaDestruida = false;
        balas = balas.filter(bala => {
          if (!naveEnemigaDestruida && distancia(bala.x, bala.y, naveEnemiga.x, naveEnemiga.y) < naveEnemiga.tamano + 5) {
            vidas++;
            naveEnemigaDestruida = true;
            puntos += 100;
            puntosUltimaEnemiga = puntos;
            return false;
          }
          return true;
        });
        if (naveEnemigaDestruida) {
          naveEnemiga = null;
        }
      }

      if (naveEnemiga && !invencible &&
          distancia(nave.x, nave.y, naveEnemiga.x, naveEnemiga.y) < naveEnemiga.tamano + nave.tamano * 0.6) {
        naveEnemiga = null;
        perderVida();
      }

      if (!naveEnemiga && puntos >= puntosUltimaEnemiga + 250) {
        naveEnemiga = crearNaveEnemiga();
        puntosUltimaEnemiga = puntos;
      }

      // Colisión balas vs jefe
      if (jefe) {
        balas = balas.filter(bala => {
          if (distancia(bala.x, bala.y, jefe.x, jefe.y) < jefe.tamano) {
            jefe.vida--;
            if (jefe.vida <= 0) {
              puntos += 500;
              escudo = true;
              setTimeout(() => { escudo = false; }, 5000);
              jefe = null;
              balasEnemigas = [];
              ronda++;
              iniciarMetoritos();
            }
            return false;
          }
          return true;
        });
      }

      // Colisión balas enemigas vs nave
      if (!invencible && !escudo) {
        balasEnemigas = balasEnemigas.filter(b => {
          if (distancia(b.x, b.y, nave.x, nave.y) < nave.tamano * 0.6 + 4) {
            perderVida();
            return false;
          }
          return true;
        });
      }

      // Si no hay jefe activo, revisa fin de ronda normal
      if (!jefe && meteoritos.length === 0 && metoritosEnCola === 0) {
        ronda++;
        iniciarMetoritos();
      }
    }

    function dibujarHUD() {
      ctx.fillStyle = 'white';
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, 15, 30);

      for (let i = 0; i < vidas; i++) {
        ctx.save();
        ctx.translate(canvas.width - 30 - i * 30, 25);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(6, 10);
        ctx.lineTo(-6, 10);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }

      // Indicador de escudo
      if (escudo) {
        ctx.fillStyle = 'cyan';
        ctx.font = '16px Arial';
        ctx.fillText('ESCUDO ACTIVO', 15, 55);
      }
    }

    function dibujarGameOver() {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, canvas.width / 2, canvas.height / 2 + 40);
      ctx.fillText('Toca para reiniciar', canvas.width / 2, canvas.height / 2 + 80);
      ctx.textAlign = 'left';
    }

    function reiniciar() {
      nave.x = canvas.width / 2;
      nave.velocidadX = 0;
      balas = [];
      balasEnemigas = [];
      meteoritos = [];
      puntos = 0;
      vidas = 2;
      vivo = true;
      ronda = 0;
      naveEnemiga = null;
      puntosUltimaEnemiga = 0;
      invencible = false;
      escudo = false;
      jefe = null;
      iniciarMetoritos();
    }

    document.addEventListener('click', () => {
      if (!juegoActivo) {
        mensaje.style.display = 'none';
        juegoActivo = true;
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission().then(r => {
            if (r === 'granted') activarGiroscopio();
          });
        } else {
          activarGiroscopio();
        }
      } else if (!vivo) {
        reiniciar();
      } else {
        disparar();
      }
    });

    function activarGiroscopio() {
      let filtroX = 0;
      let giroscopioPrimer = false;

      window.addEventListener('deviceorientation', (e) => {
        const rawX = e.gamma / 45;
        filtroX = filtroX * 0.7 + rawX * 0.3;
        inclinacionX = filtroX;

        if (!giroscopioPrimer) {
          giroscopioPrimer = true;
          iniciarMetoritos();
        }
      }, { passive: true });
    }

    function disparar() {
      const ahora = Date.now();
      if (ahora - ultimoDisparo < 300) return;
      ultimoDisparo = ahora;
      balas.push({
        x: nave.x,
        y: nave.y,
        velocidadX: 0,
        velocidadY: -8
      });
    }

    function actualizarBalas() {
      balas = balas.filter(bala => {
        bala.x += bala.velocidadX;
        bala.y += bala.velocidadY;
        return bala.y > -10;
      });
    }

    function dibujarBalas() {
      ctx.fillStyle = 'yellow';
      balas.forEach(bala => {
        ctx.beginPath();
        ctx.arc(bala.x, bala.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    let parpadeo = 0;
    function dibujarNave() {
      if (invencible) {
        parpadeo++;
        if (parpadeo % 6 < 3) return;
      }
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.strokeStyle = escudo ? 'cyan' : 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();

      if (escudo) {
        ctx.beginPath();
        ctx.arc(0, 0, nave.tamano * 1.4, 0, Math.PI * 2);
        ctx.strokeStyle = 'cyan';
        ctx.stroke();
      }

      ctx.restore();
    }

    function actualizarNave() {
      if (Math.abs(inclinacionX) > 0.1) {
        nave.velocidadX += (inclinacionX * 5 - nave.velocidadX) * 0.15;
      } else {
        nave.velocidadX *= 0.85;
      }

      nave.x += nave.velocidadX;

      if (nave.x < nave.tamano) nave.x = nave.tamano;
      if (nave.x > canvas.width - nave.tamano) nave.x = canvas.width - nave.tamano;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (vivo) {
        if (metoritosEnCola > 0 && Date.now() - tiempoUltimoSpawn > 600) {
          meteoritos.push(crearMeteorito(35));
          metoritosEnCola--;
          tiempoUltimoSpawn = Date.now();
        }

        actualizarNave();
        actualizarBalas();
        actualizarMetoritos();
        actualizarNaveEnemiga();
        actualizarJefe();
        actualizarBalasEnemigas();
        chequearColisiones();
        dibujarNave();
        dibujarBalas();
        dibujarMetoritos();
        dibujarNaveEnemiga();
        dibujarJefe();
        dibujarBalasEnemigas();
        dibujarHUD();
      } else {
        dibujarGameOver();
      }
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
