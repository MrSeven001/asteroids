<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="screen-orientation" content="landscape">
  <title>Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: black; overflow: hidden; }
    canvas { display: block; }
    #mensaje {
      position: fixed;
      top: 50%;
      left: 0; right: 0;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <canvas id="juego"></canvas>
  <div id="mensaje">Toca la pantalla para activar</div>

  <script>
    const canvas = document.getElementById('juego');
    const ctx = canvas.getContext('2d');
    const mensaje = document.getElementById('mensaje');

    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const nave = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      angulo: 0,
      velocidadX: 0,
      velocidadY: 0,
      tamano: 20
    };

    let inclinacionX = 0;
    let inclinacionY = 0;
    let juegoActivo = false;
    let balas = [];
    let ultimoDisparo = 0;
    let meteoritos = [];
    let puntos = 0;
    let vidas = 2;
    let vivo = true;
    let ronda = 1;
    let naveEnemiga = null;
    let puntosUltimaEnemiga = 0;
    let invencible = false; // parpadeo al perder vida

    function crearMeteorito(tamano, x, y) {
      if (x === undefined) {
        const borde = Math.floor(Math.random() * 4);
        if (borde === 0) { x = Math.random() * canvas.width; y = -tamano; }
        else if (borde === 1) { x = Math.random() * canvas.width; y = canvas.height + tamano; }
        else if (borde === 2) { x = -tamano; y = Math.random() * canvas.height; }
        else { x = canvas.width + tamano; y = Math.random() * canvas.height; }
      }

      const anguloAlCentro = Math.atan2(
        canvas.height / 2 - y,
        canvas.width  / 2 - x
      ) + (Math.random() - 0.5) * 1.5;

      const velocidad = tamano > 30 ? 0.8 : tamano > 15 ? 1.3 : 2.0;

      return {
        x, y, tamano,
        velocidadX: Math.cos(anguloAlCentro) * velocidad,
        velocidadY: Math.sin(anguloAlCentro) * velocidad,
        forma: Array.from({ length: 10 }, (_, i) => {
          const angulo = (i / 10) * Math.PI * 2;
          const radio = tamano * (0.7 + Math.random() * 0.5);
          return { x: Math.cos(angulo) * radio, y: Math.sin(angulo) * radio };
        })
      };
    }

    function crearNaveEnemiga() {
      const borde = Math.floor(Math.random() * 4);
      let x, y;
      if (borde === 0) { x = Math.random() * canvas.width; y = -20; }
      else if (borde === 1) { x = Math.random() * canvas.width; y = canvas.height + 20; }
      else if (borde === 2) { x = -20; y = Math.random() * canvas.height; }
      else { x = canvas.width + 20; y = Math.random() * canvas.height; }

      const anguloAlCentro = Math.atan2(
        canvas.height / 2 - y,
        canvas.width  / 2 - x
      ) + (Math.random() - 0.5) * 1.0;

      return {
        x, y,
        angulo: anguloAlCentro,
        velocidadX: Math.cos(anguloAlCentro) * 2,
        velocidadY: Math.sin(anguloAlCentro) * 2,
        tamano: 15
      };
    }

    function iniciarMetoritos() {
      for (let i = 0; i < ronda + 1; i++) {
        meteoritos.push(crearMeteorito(45));
      }
    }

    function actualizarMetoritos() {
      meteoritos.forEach(m => {
        m.x += m.velocidadX;
        m.y += m.velocidadY;
        if (m.x < -m.tamano) m.x = canvas.width + m.tamano;
        if (m.x > canvas.width + m.tamano) m.x = -m.tamano;
        if (m.y < -m.tamano) m.y = canvas.height + m.tamano;
        if (m.y > canvas.height + m.tamano) m.y = -m.tamano;
      });
    }

    function actualizarNaveEnemiga() {
      if (!naveEnemiga) return;
      naveEnemiga.x += naveEnemiga.velocidadX;
      naveEnemiga.y += naveEnemiga.velocidadY;
      if (naveEnemiga.x < -30) naveEnemiga.x = canvas.width + 30;
      if (naveEnemiga.x > canvas.width + 30) naveEnemiga.x = -30;
      if (naveEnemiga.y < -30) naveEnemiga.y = canvas.height + 30;
      if (naveEnemiga.y > canvas.height + 30) naveEnemiga.y = -30;
    }

    function dibujarMetoritos() {
      ctx.strokeStyle = 'gray';
      ctx.lineWidth = 2;
      meteoritos.forEach(m => {
        ctx.save();
        ctx.translate(m.x, m.y);
        ctx.beginPath();
        ctx.moveTo(m.forma[0].x, m.forma[0].y);
        m.forma.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      });
    }

    function dibujarNaveEnemiga() {
      if (!naveEnemiga) return;
      ctx.save();
      ctx.translate(naveEnemiga.x, naveEnemiga.y);
      ctx.rotate(naveEnemiga.angulo);
      ctx.strokeStyle = 'red';
      ctx.lineWidth = 2;
      // Forma de nave enemiga: tipo platillo
      ctx.beginPath();
      ctx.ellipse(0, 0, 18, 8, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.ellipse(0, -5, 8, 5, 0, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
    }

    function distancia(ax, ay, bx, by) {
      return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
    }

    function perderVida() {
      vidas--;
      if (vidas <= 0) {
        vivo = false;
      } else {
        // Parpadeo de invencibilidad por 2 segundos
        invencible = true;
        nave.x = canvas.width / 2;
        nave.y = canvas.height / 2;
        nave.velocidadX = 0;
        nave.velocidadY = 0;
        setTimeout(() => { invencible = false; }, 2000);
      }
    }

    function chequearColisiones() {
      let meteoritosNuevos = [];

      meteoritos = meteoritos.filter(m => {
        let golpeado = false;
        balas = balas.filter(bala => {
          if (distancia(bala.x, bala.y, m.x, m.y) < m.tamano) {
            golpeado = true;
            return false;
          }
          return true;
        });

        if (golpeado) {
          if (m.tamano > 15) {
            const angulo1 = Math.atan2(m.velocidadY, m.velocidadX) + 0.6;
            const angulo2 = Math.atan2(m.velocidadY, m.velocidadX) - 0.6;
            const vel = m.tamano > 30 ? 1.3 : 2.0;
          
            const pedazo1 = crearMeteorito(m.tamano / 2, m.x, m.y);
            pedazo1.velocidadX = Math.cos(angulo1) * vel;
            pedazo1.velocidadY = Math.sin(angulo1) * vel;
          
            const pedazo2 = crearMeteorito(m.tamano / 2, m.x, m.y);
            pedazo2.velocidadX = Math.cos(angulo2) * vel;
            pedazo2.velocidadY = Math.sin(angulo2) * vel;
          
            meteoritosNuevos.push(pedazo1);
            meteoritosNuevos.push(pedazo2);
          }
          puntos += m.tamano > 30 ? 10 : m.tamano > 15 ? 20 : 40;
          return false;
        }

        if (!invencible && distancia(nave.x, nave.y, m.x, m.y) < m.tamano + nave.tamano * 0.6) {
          perderVida();
        }

        return true;
      });

      meteoritos = meteoritos.concat(meteoritosNuevos);

      // Colisión balas vs nave enemiga
      if (naveEnemiga) {
        balas = balas.filter(bala => {
          if (distancia(bala.x, bala.y, naveEnemiga.x, naveEnemiga.y) < naveEnemiga.tamano + 5) {
            // Destruida: da una vida extra
            vidas++;
            naveEnemiga = null;
            puntos += 100;
            puntosUltimaEnemiga = puntos;
            return false;
          }
          return true;
        });

        // Colisión nave enemiga vs jugador
        if (naveEnemiga && !invencible &&
            distancia(nave.x, nave.y, naveEnemiga.x, naveEnemiga.y) < naveEnemiga.tamano + nave.tamano * 0.6) {
          naveEnemiga = null;
          perderVida();
        }
      }

      // Aparece nave enemiga cada 250 puntos
      if (!naveEnemiga && puntos >= puntosUltimaEnemiga + 250) {
        naveEnemiga = crearNaveEnemiga();
        puntosUltimaEnemiga = puntos;
      }

      if (meteoritos.length === 0) {
        ronda++;
        iniciarMetoritos();
      }
    }

    function dibujarHUD() {
      ctx.fillStyle = 'white';
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, 15, 30);
      ctx.fillText('Ronda: ' + ronda, 15, 55);

      // Dibuja las vidas como navecitas arriba a la derecha
      for (let i = 0; i < vidas; i++) {
        ctx.save();
        ctx.translate(canvas.width - 30 - i * 30, 25);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(6, 10);
        ctx.lineTo(-6, 10);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
    }

    function dibujarGameOver() {
      ctx.fillStyle = 'white';
      ctx.font = 'bold 40px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
      ctx.font = '20px Arial';
      ctx.fillText('Puntos: ' + puntos, canvas.width / 2, canvas.height / 2 + 40);
      ctx.fillText('Toca para reiniciar', canvas.width / 2, canvas.height / 2 + 80);
      ctx.textAlign = 'left';
    }

    function reiniciar() {
      nave.x = canvas.width / 2;
      nave.y = canvas.height / 2;
      nave.angulo = 0;
      nave.velocidadX = 0;
      nave.velocidadY = 0;
      balas = [];
      meteoritos = [];
      puntos = 0;
      vidas = 2;
      vivo = true;
      ronda = 1;
      naveEnemiga = null;
      puntosUltimaEnemiga = 0;
      invencible = false;
      iniciarMetoritos();
    }

    document.addEventListener('click', () => {
      if (!juegoActivo) {
        mensaje.style.display = 'none';
        juegoActivo = true;
        iniciarMetoritos();
        if (typeof DeviceMotionEvent !== 'undefined' &&
            typeof DeviceMotionEvent.requestPermission === 'function') {
          DeviceMotionEvent.requestPermission().then(r => {
            if (r === 'granted') activarGiroscopio();
          });
        } else {
          activarGiroscopio();
        }
      } else if (!vivo) {
        reiniciar();
      } else {
        disparar();
      }
    });

    function activarGiroscopio() {
      window.addEventListener('deviceorientation', (e) => {
        // En horizontal los ejes se intercambian
        inclinacionX = e.beta  / 45;
        inclinacionY = e.gamma / 25;
      });
    }

    function disparar() {
      const ahora = Date.now();
      if (ahora - ultimoDisparo < 300) return;
      ultimoDisparo = ahora;
      balas.push({
        x: nave.x,
        y: nave.y,
        velocidadX: Math.sin(nave.angulo) * 8,
        velocidadY: -Math.cos(nave.angulo) * 8
      });
    }

    function actualizarBalas() {
      balas = balas.filter(bala => {
        bala.x += bala.velocidadX;
        bala.y += bala.velocidadY;
        return bala.x > 0 && bala.x < canvas.width &&
               bala.y > 0 && bala.y < canvas.height;
      });
    }

    function dibujarBalas() {
      ctx.fillStyle = 'yellow';
      balas.forEach(bala => {
        ctx.beginPath();
        ctx.arc(bala.x, bala.y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    let parpadeo = 0;
    function dibujarNave() {
      // Parpadea cuando es invencible
      if (invencible) {
        parpadeo++;
        if (parpadeo % 6 < 3) return;
      }
      ctx.save();
      ctx.translate(nave.x, nave.y);
      ctx.rotate(nave.angulo);
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -nave.tamano);
      ctx.lineTo(nave.tamano * 0.6,  nave.tamano);
      ctx.lineTo(-nave.tamano * 0.6, nave.tamano);
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    function actualizarNave() {
      const fuerza = Math.sqrt(inclinacionX * inclinacionX + inclinacionY * inclinacionY);
      if (fuerza > 0.15) {
        const anguloObjetivo = Math.atan2(inclinacionX, -inclinacionY);
        let diff = anguloObjetivo - nave.angulo;
        if (diff > Math.PI)  diff -= Math.PI * 2;
        if (diff < -Math.PI) diff += Math.PI * 2;
        nave.angulo += diff * 0.12;
        const velocidadBase = Math.min(fuerza, 1) * 1.8;
        const velocidad = inclinacionY < -0.15 ? velocidadBase * 1.5 : velocidadBase;
        nave.velocidadX += (Math.sin(nave.angulo) * velocidad - nave.velocidadX) * 0.15;
        nave.velocidadY += (-Math.cos(nave.angulo) * velocidad - nave.velocidadY) * 0.15;
      } else {
        nave.velocidadX *= 0.88;
        nave.velocidadY *= 0.88;
      }
      nave.x += nave.velocidadX;
      nave.y += nave.velocidadY;
      if (nave.x < 0) nave.x = canvas.width;
      if (nave.x > canvas.width)  nave.x = 0;
      if (nave.y < 0) nave.y = canvas.height;
      if (nave.y > canvas.height) nave.y = 0;
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (vivo) {
        actualizarNave();
        actualizarBalas();
        actualizarMetoritos();
        actualizarNaveEnemiga();
        chequearColisiones();
        dibujarNave();
        dibujarBalas();
        dibujarMetoritos();
        dibujarNaveEnemiga();
        dibujarHUD();
      } else {
        dibujarGameOver();
      }
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
